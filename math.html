<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика — HabiThink</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="math-game-container">
        <a href="index.html" class="back-link">← Назад</a>
        
        <header class="math-header">
            <h1>Математический поток</h1>
            <p>Просто отвечайте. Сложность растёт сама.</p>
        </header>

        <div class="game-area">
            <div class="game-stats">
                <span class="game-stat">Счёт: <span class="game-stat-value" id="score">0</span></span>
                <span class="game-stat">Серия: <span class="game-stat-value" id="streak">0</span></span>
            </div>

            <div class="problem-display" id="problem">
                2 + 3 = ?
            </div>

            <div class="answer-buttons" id="answerButtons">
                <!-- Кнопки с вариантами ответов -->
            </div>

            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <script>
        // Состояние игры
        const gameState = {
            score: 0,
            streak: 0,
            currentAnswer: null,
            difficultyMultiplier: 1
        };

        // DOM элементы
        const problemEl = document.getElementById('problem');
        const answerButtonsEl = document.getElementById('answerButtons');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');

        // Генерация случайного числа в диапазоне
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Генерация задачи
        function generateProblem() {
            const { difficultyMultiplier } = gameState;
            
            // Базовые диапазоны, которые растут незаметно
            const baseMax = 10 * difficultyMultiplier;
            const min = 1;
            const max = Math.min(baseMax, 50); // Ограничим максимум
            
            // Выбор операции на основе сложности
            let operations = ['+', '-'];
            if (difficultyMultiplier >= 2) operations.push('*');
            if (difficultyMultiplier >= 3) operations.push('/');
            
            const operation = operations[randomInt(0, operations.length - 1)];
            let num1, num2, answer;

            // Генерация чисел в зависимости от операции
            switch(operation) {
                case '+':
                    num1 = randomInt(min, max);
                    num2 = randomInt(min, max);
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = randomInt(min, max);
                    num2 = randomInt(min, num1);
                    answer = num1 - num2;
                    break;
                case '*':
                    const multMax = Math.min(max, 12);
                    num1 = randomInt(min, multMax);
                    num2 = randomInt(min, multMax);
                    answer = num1 * num2;
                    break;
                case '/':
                    num2 = randomInt(min, Math.min(max, 10));
                    answer = randomInt(min, Math.min(max, 10));
                    num1 = num2 * answer;
                    break;
            }

            // Форматирование отображения
            let displayOp = operation;
            if (operation === '*') displayOp = '×';
            if (operation === '/') displayOp = '÷';

            gameState.currentAnswer = answer;
            
            problemEl.textContent = `${num1} ${displayOp} ${num2} = ?`;
            
            generateAnswerButtons(answer);
        }

        // Генерация кнопок с ответами
        function generateAnswerButtons(correctAnswer) {
            answerButtonsEl.innerHTML = '';
            
            // Создаём массив ответов (1 правильный + 3 неправильных)
            const answers = new Set();
            answers.add(correctAnswer);
            
            while (answers.size < 4) {
                const offset = randomInt(-10, 10);
                const wrongAnswer = correctAnswer + offset;
                if (wrongAnswer !== correctAnswer && wrongAnswer > 0) {
                    answers.add(wrongAnswer);
                }
            }
            
            // Перемешиваем ответы
            const shuffledAnswers = Array.from(answers).sort(() => Math.random() - 0.5);
            
            // Создаём кнопки
            shuffledAnswers.forEach(answer => {
                const button = document.createElement('button');
                button.className = 'answer-btn';
                button.textContent = answer;
                button.addEventListener('click', () => checkAnswer(answer));
                answerButtonsEl.appendChild(button);
            });
        }

        // Проверка ответа
        function checkAnswer(userAnswer) {
            if (userAnswer === gameState.currentAnswer) {
                // Правильный ответ
                gameState.score += 10;
                gameState.streak++;
                
                // Незаметное повышение сложности каждые 5 правильных ответов
                gameState.difficultyMultiplier = Math.floor(gameState.streak / 5) + 1;
                
                showFeedback('Верно', 'correct');
                setTimeout(() => {
                    hideFeedback();
                    generateProblem();
                }, 600);
            } else {
                // Неправильный ответ
                gameState.streak = 0;
                gameState.difficultyMultiplier = 1;
                
                showFeedback(`Правильный ответ: ${gameState.currentAnswer}`, 'incorrect');
                setTimeout(() => {
                    hideFeedback();
                    generateProblem();
                }, 1000);
            }

            updateStats();
        }

        // Обновление статистики
        function updateStats() {
            scoreEl.textContent = gameState.score;
            streakEl.textContent = gameState.streak;
        }

        // Показ обратной связи
        function showFeedback(message, type) {
            feedbackEl.textContent = message;
            feedbackEl.className = `feedback ${type}`;
        }

        // Скрытие обратной связи
        function hideFeedback() {
            feedbackEl.className = 'feedback';
        }

        // Инициализация игры
        generateProblem();
    </script>
</body>
</html>

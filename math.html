<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика — HabiThink</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="math-game-container">
        <a href="index.html" class="back-link">← Назад к сферам</a>
        
        <header class="math-header">
            <h1>Математический поток</h1>
            <p>Бесконечная игра для расслабления и фокуса</p>
        </header>

        <div class="difficulty-selector">
            <button class="difficulty-btn" data-difficulty="easy">Лёгкий</button>
            <button class="difficulty-btn" data-difficulty="medium">Средний</button>
            <button class="difficulty-btn" data-difficulty="hard">Сложный</button>
            <button class="difficulty-btn active" data-difficulty="progressive">Прогрессивный</button>
        </div>

        <div class="game-area">
            <div class="game-stats">
                <span class="game-stat">Уровень: <span class="game-stat-value" id="level">1</span></span>
                <span class="game-stat">Счёт: <span class="game-stat-value" id="score">0</span></span>
                <span class="game-stat">Серия: <span class="game-stat-value" id="streak">0</span></span>
            </div>

            <div class="problem-display" id="problem">
                2 + 3 = ?
            </div>

            <input type="number" class="answer-input" id="answer" placeholder="Ваш ответ" autocomplete="off">
            <button class="submit-btn" id="submitBtn">Ответить</button>

            <div class="feedback" id="feedback"></div>

            <div class="progressive-info" id="progressiveInfo" style="display: none;">
                <strong>Прогрессивный режим:</strong> сложность растёт с каждым правильным ответом. 
                Ошибка сбрасывает уровень, но не счёт. Расслабьтесь и войдите в поток.
            </div>
        </div>
    </div>

    <script>
        // Состояние игры
        const gameState = {
            difficulty: 'progressive',
            level: 1,
            score: 0,
            streak: 0,
            currentProblem: null,
            currentAnswer: null
        };

        // DOM элементы
        const problemEl = document.getElementById('problem');
        const answerInput = document.getElementById('answer');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackEl = document.getElementById('feedback');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const progressiveInfoEl = document.getElementById('progressiveInfo');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');

        // Генерация случайного числа в диапазоне
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Выбор операции
        function getOperationForLevel(level) {
            if (level <= 2) return ['+', '-'];
            if (level <= 4) return ['+', '-', '*'];
            if (level <= 6) return ['+', '-', '*', '/'];
            return ['+', '-', '*', '/', '%'];
        }

        // Генерация задачи
        function generateProblem() {
            const { difficulty, level } = gameState;
            
            let min, max, operations;
            
            // Настройка диапазонов в зависимости от сложности
            switch(difficulty) {
                case 'easy':
                    min = 1;
                    max = 10;
                    operations = ['+', '-'];
                    break;
                case 'medium':
                    min = 5;
                    max = 20;
                    operations = ['+', '-', '*'];
                    break;
                case 'hard':
                    min = 10;
                    max = 50;
                    operations = ['+', '-', '*', '/', '%'];
                    break;
                case 'progressive':
                    // Прогрессивная сложность
                    min = Math.max(1, level * 2);
                    max = level * 10;
                    operations = getOperationForLevel(level);
                    break;
            }

            const operation = operations[randomInt(0, operations.length - 1)];
            let num1, num2, answer;

            // Генерация чисел в зависимости от операции
            switch(operation) {
                case '+':
                    num1 = randomInt(min, max);
                    num2 = randomInt(min, max);
                    answer = num1 + num2;
                    break;
                case '-':
                    num1 = randomInt(min, max);
                    num2 = randomInt(min, num1); // Чтобы не было отрицательных
                    answer = num1 - num2;
                    break;
                case '*':
                    num1 = randomInt(min, Math.min(max, 12)); // Ограничим множители
                    num2 = randomInt(min, Math.min(max, 12));
                    answer = num1 * num2;
                    break;
                case '/':
                    num2 = randomInt(min, Math.min(max, 10));
                    answer = randomInt(min, Math.min(max, 10));
                    num1 = num2 * answer; // Чтобы деление было без остатка
                    break;
                case '%':
                    num1 = randomInt(10, max);
                    num2 = randomInt(2, 10);
                    answer = num1 % num2;
                    break;
            }

            // Форматирование отображения
            let displayOp = operation;
            if (operation === '*') displayOp = '×';
            if (operation === '/') displayOp = '÷';

            gameState.currentProblem = `${num1} ${displayOp} ${num2}`;
            gameState.currentAnswer = answer;
            
            problemEl.textContent = `${gameState.currentProblem} = ?`;
        }

        // Проверка ответа
        function checkAnswer() {
            const userAnswer = parseInt(answerInput.value);
            
            if (isNaN(userAnswer)) {
                showFeedback('Введите число', 'incorrect');
                return;
            }

            if (userAnswer === gameState.currentAnswer) {
                // Правильный ответ
                gameState.score += 10 * gameState.level;
                gameState.streak++;
                
                if (gameState.difficulty === 'progressive') {
                    gameState.level = Math.floor(gameState.streak / 5) + 1;
                }
                
                showFeedback(`Правильно! +${10 * gameState.level} очков`, 'correct');
                setTimeout(() => {
                    hideFeedback();
                    generateProblem();
                    answerInput.value = '';
                    answerInput.focus();
                }, 800);
            } else {
                // Неправильный ответ
                gameState.streak = 0;
                if (gameState.difficulty === 'progressive') {
                    gameState.level = 1;
                }
                
                showFeedback(`Неверно. Правильный ответ: ${gameState.currentAnswer}`, 'incorrect');
                setTimeout(() => {
                    hideFeedback();
                    generateProblem();
                    answerInput.value = '';
                    answerInput.focus();
                }, 1500);
            }

            updateStats();
        }

        // Обновление статистики
        function updateStats() {
            levelEl.textContent = gameState.level;
            scoreEl.textContent = gameState.score;
            streakEl.textContent = gameState.streak;
        }

        // Показ обратной связи
        function showFeedback(message, type) {
            feedbackEl.textContent = message;
            feedbackEl.className = `feedback ${type}`;
        }

        // Скрытие обратной связи
        function hideFeedback() {
            feedbackEl.className = 'feedback';
        }

        // Смена сложности
        function setDifficulty(difficulty) {
            gameState.difficulty = difficulty;
            gameState.level = 1;
            gameState.score = 0;
            gameState.streak = 0;
            
            // Обновление активных кнопок
            difficultyBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.difficulty === difficulty);
            });

            // Показ информации о прогрессивном режиме
            progressiveInfoEl.style.display = difficulty === 'progressive' ? 'block' : 'none';

            updateStats();
            generateProblem();
            answerInput.value = '';
            answerInput.focus();
        }

        // Обработчики событий
        submitBtn.addEventListener('click', checkAnswer);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setDifficulty(btn.dataset.difficulty);
            });
        });

        // Инициализация игры
        setDifficulty('progressive');
    </script>
</body>
</html>
